<!doctype html>
<html lang="vi">

<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Gesture Suite</title>
  <link rel="stylesheet" href="popup.css">
</head>

<body>
  <main class="popup">
    <header class="header">
      <h1>Gesture Suite</h1>
      <p id="current-host">Đang tải host...</p>
    </header>

    <section class="card">
      <h2>Cài đặt</h2>

      <div class="table">
        <label class="item">
          <span class="label">Bật gestures</span>
          <span class="control"><input id="gestures-enabled" type="checkbox"></span>
        </label>

        <label class="item">
          <span class="label">Long press</span>
          <span class="control inline">
            <input id="g-lp-enabled" type="checkbox">
            <select id="g-lp-mode">
              <option value="bg">Nền</option>
              <option value="fg">Trước</option>
            </select>
            <input id="g-lp-ms" class="num small" type="number" min="200" max="2000" step="50">
          </span>
        </label>

        <label class="item">
          <span class="label">Right click</span>
          <span class="control inline">
            <input id="g-rc-enabled" type="checkbox">
            <select id="g-rc-mode">
              <option value="bg">Nền</option>
              <option value="fg">Trước</option>
            </select>
          </span>
        </label>

        <label class="item">
          <span class="label">Double right</span>
          <span class="control"><input id="g-dbl-right" class="num small" type="number" min="200" max="1000"
              step="50"></span>
        </label>

        <label class="item">
          <span class="label">Double tap</span>
          <span class="control inline">
            <input id="g-dbl-tap-enabled" type="checkbox">
            <input id="g-dbl-tap-ms" class="num small" type="number" min="150" max="500" step="50">
          </span>
        </label>

        <label class="item">
          <span class="label">Edge swipe</span>
          <span class="control inline">
            <input id="g-edge-enabled" type="checkbox">
            <select id="g-edge-side">
              <option value="both">2 bên</option>
              <option value="left">Trái</option>
              <option value="right">Phải</option>
            </select>
            <input id="g-edge-width" class="num xs" type="number" min="20" max="120" step="5">
            <input id="g-edge-speed" class="num xs" type="number" min="1" max="10" step="0.5">
          </span>
        </label>

        <label class="item">
          <span class="label">Pager</span>
          <span class="control inline">
            <input id="g-pager-enabled" type="checkbox">
            <input id="g-pager-threshold" class="num xs" type="number" min="20" max="500">
            <input id="g-pager-window" class="num xs" type="number" min="100" max="3000">
            <input id="g-pager-hops" class="num xs" type="number" min="1" max="10">
          </span>
        </label>

        <label class="item">
          <span class="label">Forum split</span>
          <span class="control inline">
            <input id="forum-enabled" type="checkbox">
            <span class="mini-label">Wide</span>
            <input id="forum-wide" type="checkbox">
          </span>
        </label>

        <label class="item host-only">
          <span class="label">Forum size</span>
          <span class="control inline">
            <input id="forum-min-width" class="num" type="number" min="0" max="4000" step="50">
            <input id="forum-gap" class="num xs" type="number" min="0" max="24">
            <input id="forum-fade" class="num xs" type="number" min="0" max="1000">
            <input id="forum-delay" class="num xs" type="number" min="0" max="1000">
          </span>
        </label>
      </div>

      <div class="actions">
        <button id="save-settings" class="primary">Lưu</button>
      </div>
      <p id="status" class="hint">Sẵn sàng.</p>
    </section>
  </main>

  <script src="../../shared/namespace.js"></script>
  <script src="../../shared/config.js"></script>
  <script src="../../shared/storage.js"></script>
  <script src="popup.js"></script>
</body>

</html>
